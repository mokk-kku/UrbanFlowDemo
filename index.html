<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Flow</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        
        <header class="app-header">
            <h1 style="color: #00e676; margin: 0; font-size: 20px;">Urban Flow</h1>
        </header>

        <main id="main-content">
            
            <section id="page-route" class="page-section active">
                <div class="route-search-container">
                    <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 22px;" data-en="Find Route" data-th="ค้นหาเส้นทาง">ค้นหาเส้นทาง</h2>
                    
                    <div class="route-input-card">
                        <div class="route-inputs-wrapper">
                            <div class="input-row">
                                <div class="icon-wrapper"><i class="fa-regular fa-circle-dot" style="color: var(--accent);"></i></div>
                                <div class="select-wrapper">
                                    <label data-en="Origin" data-th="เลือกสถานีต้นทาง">เลือกสถานีต้นทาง</label>
                                    <select id="startNode" class="minimal-select"></select>
                                </div>
                            </div>
                            
                            <div class="route-divider"></div>
                            
                            <div class="input-row">
                                <div class="icon-wrapper"><i class="fa-solid fa-location-dot" style="color: #ff5252;"></i></div>
                                <div class="select-wrapper">
                                    <label data-en="Destination" data-th="เลือกสถานีปลายทาง">เลือกสถานีปลายทาง</label>
                                    <select id="endNode" class="minimal-select"></select>
                                </div>
                            </div>
                        </div>
                        
                        <button class="swap-btn" id="swapBtn">
                            <i class="fa-solid fa-arrow-right-arrow-left" style="transform: rotate(90deg);"></i>
                        </button>
                    </div>
                    
                    <h3 style="font-size: 14px; margin-top: 25px; margin-bottom: 15px; color: var(--text-secondary);" data-en="Travel Mode" data-th="รูปแบบการเดินทาง">รูปแบบการเดินทาง</h3>
                    
                    <div class="mode-cards">
                        <button class="mode-card active" data-mode="time">
                            <div class="mode-icon"><i class="fa-regular fa-clock"></i></div>
                            <span data-en="Fastest" data-th="เร็วที่สุด">เร็วที่สุด</span>
                        </button>
                        <button class="mode-card" data-mode="cost">
                            <div class="mode-icon"><i class="fa-solid fa-coins"></i></div>
                            <span data-en="Cheapest" data-th="ประหยัดสุด">ประหยัดสุด</span>
                        </button>
                        <button class="mode-card" data-mode="walk">
                            <div class="mode-icon"><i class="fa-solid fa-person-walking"></i></div>
                            <span data-en="Walkless" data-th="เดินน้อยสุด">เดินน้อยสุด</span>
                        </button>
                    </div>

                    <h3 style="font-size: 14px; margin-top: 25px; margin-bottom: 15px; color: var(--text-secondary);" data-en="Location Preview" data-th="ตัวอย่างตำแหน่งสถานี">ตัวอย่างตำแหน่งสถานี</h3>
                    <div class="mini-map-container">
                        <div id="mini-map"></div>
                    </div>
                    
                    <button id="searchBtn" class="primary-btn" style="margin-top: 20px;" data-en="Search Route" data-th="ค้นหาเส้นทาง">ค้นหาเส้นทาง</button>
                </div>
                
                <div id="results-container">
                    <div id="results">
                        </div>
                </div>
            </section>

            <section id="page-map" class="page-section">
                <div id="map"></div>
            </section>

            <section id="page-favorites" class="page-section">
                <h2 style="padding: 20px 20px 0; margin: 0;" data-en="Saved Routes" data-th="เส้นทางโปรด">Saved Routes</h2>
                <div style="padding: 20px; color: #888; text-align: center; margin-top: 50px;" data-en="No saved routes yet." data-th="ยังไม่มีเส้นทางที่บันทึกไว้">
                    No saved routes yet.
                </div>
            </section>

            <section id="page-profile" class="page-section" style="position: relative; overflow: hidden; background: #121212;">
                <div id="profile-main" style="height: 100%; overflow-y: auto;">
                    <div class="profile-top-header">
                        <button class="icon-btn" onclick="document.querySelector('[data-target=\'page-route\']').click()"><i class="fa-solid fa-chevron-left"></i></button>
                        <h2 data-en="Settings" data-th="ตั้งค่า">Settings</h2>
                        <div style="width: 24px;"></div>
                    </div>
                    
                    <div style="padding: 0 20px;">
                        <div class="new-profile-card">
                            <div class="avatar-container" onclick="openSubPage('sub-edit-profile')">
                                <img src="" id="userAvatar" alt="Avatar">
                                <div class="avatar-badge"><i class="fa-solid fa-camera"></i></div>
                            </div>
                            <h3 id="profileName">user01</h3>
                            <p id="profileEmail">user@g.com</p>
                        </div>
                    </div>

                    <div class="new-profile-menu">
                        <div class="menu-item" onclick="openSubPage('sub-edit-profile')">
                            <div class="menu-item-left"><i class="fa-regular fa-user"></i> <span data-en="Account" data-th="บัญชี">Account</span></div>
                            <i class="fa-solid fa-chevron-right arrow-icon"></i>
                        </div>
                        <div class="menu-item">
                            <div class="menu-item-left"><i class="fa-regular fa-bell"></i> <span data-en="Notifications" data-th="การแจ้งเตือน">Notifications</span></div>
                            <div class="toggle-switch active"></div>
                        </div>
                        <div class="menu-item" id="menuLangToggle">
                            <div class="menu-item-left"><i class="fa-solid fa-globe"></i> <span data-en="Change Language" data-th="เปลี่ยนภาษา">Change Language</span></div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="color: var(--accent); font-size: 12px; font-weight: bold;" id="langStatusIndicator">TH</span>
                                <i class="fa-solid fa-chevron-right arrow-icon"></i>
                            </div>
                        </div>
                        <div class="menu-item logout-item" onclick="logout()">
                            <div class="menu-item-left" style="color: #ff5252;"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span data-en="Logout" data-th="ออกจากระบบ">Logout</span></div>
                            <i class="fa-solid fa-chevron-right arrow-icon" style="color: #ff5252;"></i>
                        </div>
                    </div>
                </div>

                <div id="sub-edit-profile" class="sub-page">
                    <div class="sub-page-header">
                        <button class="icon-btn" onclick="closeSubPage('sub-edit-profile')"><i class="fa-solid fa-chevron-left"></i></button>
                        <h3 data-en="Edit Profile" data-th="บัญชี">Account</h3>
                        <div style="width: 24px;"></div>
                    </div>
                    <div style="padding: 20px;">
                        <div class="avatar-container" style="display: block; width: fit-content; margin: 0 auto 30px;">
                            <img src="" id="editAvatarPreview" alt="Avatar">
                            <div class="avatar-badge"><i class="fa-solid fa-camera"></i></div>
                        </div>
                        <div class="input-group">
                            <label data-en="Display Name" data-th="ชื่อแสดงผล">Display Name</label>
                            <input type="text" id="editNameInput" class="minimal-select" style="background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333;">
                        </div>
                        <button class="primary-btn" onclick="saveProfile()" style="margin-top: 20px;" data-en="Save Changes" data-th="บันทึกข้อมูล">Save Changes</button>
                    </div>
                </div>
            </section>

        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-target="page-route">
                <i class="fa-solid fa-route"></i>
                <span data-en="Routes" data-th="เส้นทาง">Routes</span>
            </button>
            <button class="nav-item" data-target="page-map">
                <i class="fa-solid fa-map-location-dot"></i>
                <span data-en="Map" data-th="แผนที่">Map</span>
            </button>
            <button class="nav-item" data-target="page-favorites">
                <i class="fa-solid fa-heart"></i>
                <span data-en="Favorites" data-th="รายการโปรด">Favorites</span>
            </button>
            <button class="nav-item" data-target="page-profile">
                <i class="fa-solid fa-user"></i>
                <span data-en="Profile" data-th="ตั้งค่า">Profile</span>
            </button>
        </nav>

    </div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
